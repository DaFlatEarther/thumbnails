<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<meta name="color-scheme" content="light dark" />
<!-- Preconnect to Kie's image CDN so the first thumbnail loads fast once it
     arrives. (The CSP allowlist on the resource declares the same origins.) -->
<link rel="preconnect" href="https://tempfile.aiquickdraw.com" crossorigin />
<link rel="preconnect" href="https://file.aiquickdraw.com" crossorigin />
<link rel="preconnect" href="https://cdn.kie.ai" crossorigin />
<link rel="preconnect" href="https://i.ytimg.com" crossorigin />
<link rel="preconnect" href="https://audio.algrow.online" crossorigin />
<style>
  :root {
    --ink:   var(--color-text-primary,   #0f1111);
    --sub:   var(--color-text-secondary, #5a6270);
    --line:  var(--color-border-default, #e3e6ea);
    --card:  var(--color-surface-secondary, #f6f7f9);
    --accent:var(--color-accent, #2a6df4);
    --bad:   var(--color-text-error, #b54040);
    --field: var(--color-surface-primary, #fff);
  }
  :root.dark {
    --ink:   var(--color-text-primary,   #f1f3f5);
    --sub:   var(--color-text-secondary, #a8b0bc);
    --line:  var(--color-border-default, #2a2f38);
    --card:  var(--color-surface-secondary, #1a1d22);
    --accent:var(--color-accent, #87aaff);
    --field: var(--color-surface-primary, #0f1216);
  }
  html, body { background: transparent; color: var(--ink); margin: 0; }
  body { font: 14px/1.4 -apple-system, BlinkMacSystemFont, system-ui, "Segoe UI", Roboto, sans-serif; }
  .wrap { display: flex; flex-direction: column; gap: 10px; padding: 4px; }
  .preview {
    width: 100%;
    aspect-ratio: 16 / 9;
    border-radius: 10px;
    border: 1px solid var(--line);
    background: var(--card);
    overflow: hidden;
    position: relative;
    display: flex; align-items: center; justify-content: center;
  }
  .preview img { width: 100%; height: 100%; object-fit: cover; display: block; cursor: zoom-in; }
  .preview .empty, .preview .err {
    color: var(--sub); font-size: 13px; padding: 16px; text-align: center;
  }
  .preview .err { color: var(--bad); }
  .preview .spinner {
    width: 28px; height: 28px;
    border: 3px solid var(--line);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.9s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .meta {
    display: flex; gap: 10px; font-size: 12px; color: var(--sub);
    align-items: center; flex-wrap: wrap;
  }
  .meta a { color: var(--accent); text-decoration: none; }
  .meta a:hover { text-decoration: underline; }
  textarea {
    width: 100%;
    box-sizing: border-box;
    min-height: 64px;
    max-height: 160px;
    padding: 9px 11px;
    border-radius: 8px;
    border: 1px solid var(--line);
    background: var(--field);
    color: var(--ink);
    font: inherit;
    resize: vertical;
  }
  textarea:focus { outline: none; border-color: var(--accent); }
  .row { display: flex; gap: 8px; align-items: center; }
  select, button {
    padding: 7px 11px;
    border-radius: 8px;
    border: 1px solid var(--line);
    background: var(--field);
    color: var(--ink);
    font: inherit;
    cursor: pointer;
  }
  button.primary {
    background: var(--accent); color: white; border-color: var(--accent);
    font-weight: 600; padding: 7px 16px;
  }
  button.primary:disabled { opacity: 0.55; cursor: progress; }
  .hint { color: var(--sub); font-size: 12px; }
  .ref-toggle {
    color: var(--accent);
    background: transparent;
    border: none;
    padding: 0;
    font: inherit;
    cursor: pointer;
    text-align: left;
  }
  .ref-toggle:hover { text-decoration: underline; }
  .ref-box {
    border: 1px dashed var(--line);
    border-radius: 8px;
    padding: 8px;
    background: var(--card);
    display: flex; flex-direction: column; gap: 8px;
  }
  .ref-box textarea {
    min-height: 48px;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 12px;
  }
  .ref-thumbs {
    display: flex; flex-wrap: wrap; gap: 6px;
  }
  .ref-thumb {
    position: relative;
    width: 96px; height: 54px;          /* 16:9 mini preview */
    border-radius: 6px;
    overflow: hidden;
    background: #000;
    border: 1px solid var(--line);
  }
  .ref-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .ref-thumb .badge {
    position: absolute; top: 2px; left: 2px;
    background: rgba(0,0,0,0.6); color: #fff;
    font-size: 10px; padding: 1px 4px; border-radius: 3px;
  }
  .outliers-section {
    border: 1px dashed var(--line);
    border-radius: 8px;
    padding: 8px;
    background: var(--card);
    display: flex; flex-direction: column; gap: 8px;
  }
  .outliers-header {
    display: flex; justify-content: space-between; align-items: center;
    gap: 8px;
  }
  .outliers-header .title { font-weight: 600; font-size: 13px; }
  .outliers-header .sub { color: var(--sub); font-size: 11px; }
  .outliers-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 8px;
  }
  .outlier-card {
    position: relative;
    border-radius: 8px;
    overflow: hidden;
    cursor: pointer;
    border: 2px solid transparent;
    background: #000;
    transition: transform 0.08s ease, border-color 0.08s ease;
  }
  .outlier-card:hover { transform: translateY(-1px); }
  .outlier-card.selected { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent); }
  .outlier-card .thumb-wrap {
    width: 100%; aspect-ratio: 16/9;
    display: flex; align-items: center; justify-content: center;
  }
  .outlier-card img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .outlier-card .score-badge {
    position: absolute; top: 4px; right: 4px;
    background: rgba(0,0,0,0.7); color: #fff;
    font-size: 11px; font-weight: 600;
    padding: 2px 6px; border-radius: 4px;
  }
  .outlier-card .check {
    position: absolute; top: 4px; left: 4px;
    width: 18px; height: 18px;
    border-radius: 50%;
    background: var(--accent);
    color: white;
    display: none;
    align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700;
  }
  .outlier-card.selected .check { display: flex; }
  .outlier-card .caption {
    font-size: 11px;
    padding: 4px 6px;
    background: rgba(0,0,0,0.55);
    color: #fff;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    position: absolute; left: 0; right: 0; bottom: 0;
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="preview" id="preview">
    <div class="empty">Type a prompt below and click Generate.</div>
  </div>
  <div class="meta" id="meta" style="display:none;"></div>

  <div id="title-box" style="display:none; flex-direction:column; gap:4px; margin-bottom:8px;">
    <label for="title" style="font-size:11px; color:var(--sub); text-transform:uppercase; letter-spacing:0.04em;">Title</label>
    <input id="title" type="text" placeholder="What's the video / thumbnail about?" style="padding:8px 10px; border-radius:6px; border:1px solid var(--border); background:var(--bg); color:var(--fg); font-size:13px;">
  </div>

  <textarea id="prompt" placeholder="e.g. Cinematic close-up of a hooded figure in fog, neon highlights, dramatic lighting"></textarea>

  <div class="row" style="flex-wrap: wrap;">
    <button class="ref-toggle" id="ref-toggle" type="button">+ Add reference images (URLs)</button>
    <span style="flex:1;"></span>
    <button class="ref-toggle" id="outliers-find-btn" type="button" title="Use the prompt above as the topic">🔎 Find outliers on this topic</button>
  </div>

  <div class="outliers-section" id="outliers-section" style="display:none;">
    <div class="outliers-header">
      <div>
        <div class="title">Outliers on your topic <span class="sub" id="outliers-meta"></span></div>
      </div>
      <button class="ref-toggle" id="outliers-close-btn" type="button">× Close</button>
    </div>
    <div class="outliers-grid" id="outliers-grid"></div>
    <div id="compose-row" style="display:none; align-items:center; gap:8px; margin-top:8px;">
      <span style="font-size:12px; color:var(--sub);" id="compose-hint">Pick a reference above, then engineer the prompt from it ↓</span>
      <span style="flex:1;"></span>
      <button class="primary" id="compose-btn" type="button" disabled>Create Prompt</button>
    </div>
  </div>

  <div class="ref-box" id="ref-box" style="display:none;">
    <textarea id="ref-urls" placeholder="One per line. Examples:&#10;https://youtube.com/watch?v=...&#10;https://youtu.be/...&#10;https://i.ytimg.com/vi/.../hqdefault.jpg&#10;https://example.com/style.png"></textarea>
    <div class="ref-thumbs" id="ref-thumbs"></div>
  </div>

  <div class="row">
    <select id="aspect">
      <option value="16:9" selected>16:9 (YouTube)</option>
      <option value="9:16">9:16 (Shorts/Reels)</option>
      <option value="1:1">1:1 (Square)</option>
      <option value="4:5">4:5 (Instagram portrait)</option>
      <option value="3:2">3:2</option>
    </select>
    <select id="resolution">
      <option value="2K" selected>2K</option>
      <option value="1K">1K</option>
      <option value="4K">4K</option>
    </select>
    <select id="style-preset" title="Composition preset — picks the design rules applied to the prompt">
      <option value="person_focal" selected>Person-focal</option>
      <option value="faceless">Faceless</option>
      <option value="none">No preset</option>
    </select>
    <span style="flex:1;"></span>
    <button class="primary" id="generate">Generate</button>
  </div>

  <div class="hint">Nano Banana Pro · 3 credits per generation · usually 30–90s</div>
</div>

<script type="module">
/*__EXT_APPS_BUNDLE__*/
const { App, applyHostStyleVariables } = globalThis.ExtApps;

const preview = document.getElementById("preview");
const meta = document.getElementById("meta");
const promptEl = document.getElementById("prompt");
const aspectEl = document.getElementById("aspect");
const resolutionEl = document.getElementById("resolution");
const stylePresetEl = document.getElementById("style-preset");
const generateBtn = document.getElementById("generate");
const refToggle = document.getElementById("ref-toggle");
const refBox = document.getElementById("ref-box");
const refUrlsEl = document.getElementById("ref-urls");
const refThumbsEl = document.getElementById("ref-thumbs");
const outliersBtn = document.getElementById("outliers-find-btn");
const outliersSection = document.getElementById("outliers-section");
const outliersGrid = document.getElementById("outliers-grid");
const outliersMeta = document.getElementById("outliers-meta");
const outliersCloseBtn = document.getElementById("outliers-close-btn");
const titleBox = document.getElementById("title-box");
const titleEl = document.getElementById("title");
const composeRow = document.getElementById("compose-row");
const composeBtn = document.getElementById("compose-btn");
const composeHint = document.getElementById("compose-hint");

// True after the user clicked "Create Prompt" and the textarea was filled
// with an engineered prompt. Tells the Generate handler to send the prompt
// verbatim (style_preset='none', analyze_references=false) instead of
// re-prepending the preset / re-running vision. Cleared as soon as the
// user types into the prompt textarea — at that point we can't assume the
// directives are still consistent with what they wrote.
let promptIsComposed = false;

// The full picked outlier object — URL + original video title + channel etc.
// We pass the original title to compose_thumbnail_prompt so Gemini can
// reason about WHY the reference's design choices fit its own title before
// mapping them onto the user's new title. Without this, the mapping has no
// semantic anchor — it just photocopies visuals.
let selectedOutlier = null;

// The latest tool-result payload we rendered (success or fail). Saved so
// that when the widget re-mounts after a chat close/reopen, we can show
// the user's last generation instead of dropping them back at the empty
// picker. Updated by every render() that handles a result.
let lastResultPayload = null;

// Last successfully-generated image URL. Distinct from lastResultPayload
// because that gets nulled when Claude pushes a refined prompt (so the
// stale image doesn't haunt the preview pane), but we still want the
// URL itself around so the NEXT Generate can use it as the reference —
// multi-turn editing where the prior output is what Gemini modifies.
let priorImageForReference = null;

// Cross-device persistence — the server keeps a per-title JSON store and
// the widget reads/writes it via callServerTool. claude.ai doesn't expose
// a state API, but callServerTool from the widget is silent in the chat
// (doesn't bloat Claude's context), so this costs zero conversational
// tokens. Saves are debounced so we don't spam the server on every
// keystroke. Loads happen async on mount and are applied progressively.

let _appRef = null;  // captured during init so save/load helpers can call

function _stateKey(title) {
  return (title || "").trim().toLowerCase().slice(0, 200);
}

async function saveStateNow() {
  if (!titleEl || !_appRef) return;
  const key = _stateKey(titleEl.value);
  if (!key) return;
  try {
    await _appRef.callServerTool({
      name: "save_widget_state",
      arguments: {
        key,
        state: {
          title: titleEl.value || "",
          prompt: promptEl?.value || "",
          promptIsComposed,
          selectedOutlier,
          lastResultPayload,
          priorImageForReference,
          stylePreset: stylePresetEl?.value,
          aspectRatio: aspectEl?.value,
          resolution: resolutionEl?.value,
        },
      },
    });
  } catch (e) { /* network blip — drop silently */ }
}

let _saveTimer = null;
function saveState() {
  // Debounce ~700ms so a stream of keystrokes triggers one save.
  if (_saveTimer) clearTimeout(_saveTimer);
  _saveTimer = setTimeout(saveStateNow, 700);
}

async function loadStateForTitleAsync(title) {
  if (!_appRef) return null;
  const key = _stateKey(title);
  if (!key) return null;
  try {
    const res = await _appRef.callServerTool({
      name: "load_widget_state",
      arguments: { key },
    });
    const text = res?.content?.[0]?.text ?? "";
    const data = text ? JSON.parse(text) : null;
    return data?.state || null;
  } catch (e) {
    return null;
  }
}

// Client-side mirror of the server's _resolve_reference_url. Used purely
// to populate the live thumbnail preview row as the user types — the server
// re-normalizes on submit, so a bug here is cosmetic, not security.
const YT_RE = /(?:youtube\.com\/(?:watch\?(?:[^#]*&)?v=|shorts\/|embed\/|live\/)|youtu\.be\/)([A-Za-z0-9_-]{11})/;
const BARE_ID_RE = /^[A-Za-z0-9_-]{11}$/;
function resolveRef(raw) {
  const s = (raw || "").trim();
  if (!s) return null;
  if (s.includes("i.ytimg.com")) return s;
  const m = s.match(YT_RE);
  if (m) return `https://i.ytimg.com/vi/${m[1]}/hqdefault.jpg`;
  if (BARE_ID_RE.test(s)) return `https://i.ytimg.com/vi/${s}/hqdefault.jpg`;
  if (/^https?:\/\//.test(s)) return s;
  return null;
}
function parseRefUrls() {
  const lines = (refUrlsEl?.value || "").split(/[\n,]+/);
  const out = [];
  const seen = new Set();
  for (const line of lines) {
    const r = resolveRef(line);
    if (r && !seen.has(r)) {
      seen.add(r);
      out.push(r);
      if (out.length >= 8) break;
    }
  }
  return out;
}
function fmtScore(s) {
  if (s == null) return "";
  const n = Number(s);
  if (!Number.isFinite(n)) return "";
  return `${n.toFixed(1)}×`;
}

function isUrlInRefs(url) {
  if (!url) return false;
  return (refUrlsEl?.value || "").split(/[\n,]+/).some((line) => line.trim() === url);
}

function toggleUrlInRefs(url) {
  if (!url || !refUrlsEl) return false;
  const lines = (refUrlsEl.value || "").split("\n").map((l) => l.trim()).filter(Boolean);
  const idx = lines.indexOf(url);
  if (idx >= 0) {
    lines.splice(idx, 1);
  } else {
    lines.push(url);
  }
  refUrlsEl.value = lines.join("\n");
  // Surface the textarea so the user can see what they've picked.
  if (lines.length && refBox) {
    refBox.style.display = "flex";
    if (refToggle) refToggle.textContent = "– Hide reference URLs";
  }
  renderRefThumbs();
  return idx < 0;  // returns true if just added
}

// Single-select mode for the outlier picker — replaces whatever's in
// reference_urls with just the clicked URL (or clears it if the same card
// is clicked again). Lets the user commit to ONE reference cleanly rather
// than accumulating picks.
function setSingleRefInUrls(url) {
  if (!url || !refUrlsEl) return false;
  const current = (refUrlsEl.value || "").trim();
  const isSame = current === url;
  refUrlsEl.value = isSame ? "" : url;
  if (!isSame && refBox) {
    refBox.style.display = "flex";
    if (refToggle) refToggle.textContent = "– Hide reference URLs";
  }
  renderRefThumbs();
  return !isSame;  // true when newly selected, false when cleared
}

function renderOutliers(payload) {
  if (!outliersSection || !outliersGrid) return;
  const list = Array.isArray(payload?.outliers) ? payload.outliers : [];
  outliersSection.style.display = "flex";
  if (outliersMeta) {
    const topic = payload?.topic ? `· "${payload.topic}"` : "";
    const ct = payload?.content_type ? `· ${payload.content_type}` : "";
    outliersMeta.textContent = `${list.length} found ${topic} ${ct}`.replace(/\s+/g, " ").trim();
  }
  if (payload?.error) {
    outliersGrid.innerHTML = `<div class="err" style="padding:6px;">${escape(payload.error)}</div>`;
    return;
  }
  if (!list.length) {
    outliersGrid.innerHTML = `<div class="hint" style="padding:6px;">No outliers found for this topic. Try a broader phrase.</div>`;
    return;
  }
  outliersGrid.innerHTML = "";
  for (const o of list) {
    if (!o.thumbnail_url) continue;
    const card = document.createElement("div");
    card.className = "outlier-card" + (isUrlInRefs(o.thumbnail_url) ? " selected" : "");
    card.title = `${o.title || ""}\n${o.channel_name || ""}`;
    card.innerHTML = `
      <div class="thumb-wrap">
        <img src="${escape(o.thumbnail_url)}" referrerpolicy="no-referrer" alt="">
      </div>
      <div class="score-badge">${escape(fmtScore(o.outlier_score))}</div>
      <div class="check">✓</div>
      <div class="caption">${escape(o.title || "")}</div>
    `;
    card.addEventListener("click", () => {
      const added = setSingleRefInUrls(o.thumbnail_url);
      // Clear .selected from every sibling card, then mark this one.
      outliersGrid.querySelectorAll(".outlier-card.selected").forEach((c) => c.classList.remove("selected"));
      if (added) {
        card.classList.add("selected");
        selectedOutlier = o;
      } else {
        selectedOutlier = null;
      }
      // A new reference invalidates any previously-composed prompt — the
      // directives were keyed to the OLD reference's design analysis.
      promptIsComposed = false;
      refreshComposeRow();
      saveState();
    });
    outliersGrid.appendChild(card);
  }
  refreshComposeRow();
}

// Show / hide / enable the "Create Prompt" button based on whether a card
// is selected and whether the title is filled. Called whenever the picker
// state changes.
function refreshComposeRow() {
  if (!composeRow || !composeBtn) return;
  const hasSelection = !!outliersGrid?.querySelector(".outlier-card.selected");
  const hasTitle = !!(titleEl?.value || "").trim();
  const picker = outliersSection?.style.display === "flex";
  composeRow.style.display = picker ? "flex" : "none";
  composeBtn.disabled = !(hasSelection && hasTitle);
  if (composeHint) {
    if (!hasTitle) composeHint.textContent = "Enter a title above, then pick a reference and click Create Prompt.";
    else if (!hasSelection) composeHint.textContent = "Pick one reference above, then click Create Prompt.";
    else composeHint.textContent = "Ready — click Create Prompt to engineer the image-gen prompt.";
  }
}

function renderRefThumbs() {
  if (!refThumbsEl) return;
  const urls = parseRefUrls();
  refThumbsEl.innerHTML = "";
  urls.forEach((u, i) => {
    const wrap = document.createElement("div");
    wrap.className = "ref-thumb";
    wrap.title = u;
    wrap.innerHTML = `<img src="${escape(u)}" referrerpolicy="no-referrer" alt=""><div class="badge">#${i + 1}</div>`;
    refThumbsEl.appendChild(wrap);
  });
}

function setLoading(state) {
  if (state) {
    preview.innerHTML = '<div class="spinner"></div>';
    generateBtn.disabled = true;
    generateBtn.textContent = "Generating…";
  } else {
    generateBtn.disabled = false;
    generateBtn.textContent = "Generate";
  }
}

function escape(s) {
  return String(s ?? "").replace(/[&<>"']/g, (c) => (
    { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]
  ));
}

// While a generation is in flight the widget polls check_thumbnail_status.
// We track the active task and a timer so a brand-new generation cancels
// the previous poller (e.g. user hits Generate again before the first one
// finishes).
let activePollTaskId = null;
let pollTimer = null;
const POLL_INTERVAL_MS = 3000;
const MAX_POLL_S = 300;   // hard ceiling — Nano Banana Pro should be well
                          // under 90s; this just prevents a runaway loop
                          // if Kie gets stuck.

function stopPolling() {
  if (pollTimer) clearTimeout(pollTimer);
  pollTimer = null;
  activePollTaskId = null;
}

function startPolling(taskId, app, opts) {
  activePollTaskId = taskId;
  const start = Date.now();

  async function tick() {
    if (activePollTaskId !== taskId) return;  // superseded by a newer gen
    if ((Date.now() - start) / 1000 > MAX_POLL_S) {
      stopPolling();
      preview.innerHTML = `<div class="err">Timed out waiting for Kie (>${MAX_POLL_S}s)</div>`;
      setLoading(false);
      return;
    }
    try {
      const res = await app.callServerTool({
        name: "check_thumbnail_status",
        arguments: {
          task_id: taskId,
          prompt: opts.prompt || "",
          aspect_ratio: opts.aspect_ratio || "16:9",
          resolution: opts.resolution || "2K",
          reference_urls: opts.reference_urls || [],
          style_preset: opts.style_preset || "person_focal",
          outliers: opts.outliers || [],
          outlier_topic: opts.outlier_topic || null,
        },
      });
      const text = res?.content?.[0]?.text ?? "";
      const data = text ? JSON.parse(text) : null;
      if (activePollTaskId !== taskId) return;
      if (data?.state === "success" || data?.state === "fail") {
        stopPolling();
        render(data, app);
        setLoading(false);
        return;
      }
      // Still pending — render the latest payload (keeps spinner) and
      // schedule the next poll.
      render(data, app, { keepLoading: true });
      pollTimer = setTimeout(tick, POLL_INTERVAL_MS);
    } catch (err) {
      // Network/host hiccup — keep trying; the host-side timeout cap
      // applies per call so a single failure isn't fatal.
      pollTimer = setTimeout(tick, POLL_INTERVAL_MS);
    }
  }

  pollTimer = setTimeout(tick, POLL_INTERVAL_MS);
}

function render(payload, app, opts = {}) {
  if (!payload) {
    preview.innerHTML = `<div class="empty">No data.</div>`;
    meta.style.display = "none";
    return;
  }

  // Claude (or the user) called find_outlier_references — show the picker
  // grid. Leave the preview pane alone (no image to render here) and let
  // the user pick references + then click Generate.
  if (payload.view === "outlier_picker") {
    // Show the title box and pre-fill it with the title Claude passed
    // (falling back to the algrow search topic if no title — better than
    // a blank field). The prompt textarea stays empty; the user fills it
    // by clicking "Create Prompt" after picking a reference.
    if (titleBox) titleBox.style.display = "flex";
    const titleVal = payload.title || payload.topic || "";
    if (titleEl && !titleEl.value) titleEl.value = titleVal;
    renderOutliers(payload);

    // Single-reference mode (user pasted a specific YouTube video) —
    // auto-select that card so they skip the picking step.
    if (payload.single_reference && Array.isArray(payload.outliers) && payload.outliers.length === 1) {
      const o = payload.outliers[0];
      if (o?.thumbnail_url) {
        selectedOutlier = o;
        setSingleRefInUrls(o.thumbnail_url);
        outliersGrid.querySelectorAll(".outlier-card").forEach((c) => {
          const img = c.querySelector("img");
          if (img && img.src === o.thumbnail_url) c.classList.add("selected");
        });
      }
    }

    // If the server pushed a refined_prompt (from set_widget_prompt /
    // refine_thumbnail_prompt), drop it straight into the textarea and
    // mark composed so the user can hit Generate immediately. Stash the
    // prior generation's image URL into priorImageForReference (so the
    // next Generate uses it as the reference for multi-turn editing),
    // then clear lastResultPayload so the preview pane shows fresh canvas
    // instead of the stale render.
    if (payload.refined_prompt && promptEl) {
      promptEl.value = payload.refined_prompt;
      promptIsComposed = true;
      if (lastResultPayload?.images?.[0]) {
        priorImageForReference = lastResultPayload.images[0];
      }
      lastResultPayload = null;
      saveState();
    }

    if (preview) {
      if (payload.refined_prompt) {
        preview.innerHTML = `<div class="empty">Prompt refined and ready below — review the changes, then click <b>Generate</b>.</div>`;
      } else {
        preview.innerHTML = payload.single_reference
          ? `<div class="empty">Reference loaded.  Confirm the title above, then click <b>Create Prompt</b>, then <b>Generate</b>.</div>`
          : `<div class="empty">1. Confirm the title above.  2. Pick a reference below.  3. Click <b>Create Prompt</b>.  4. Click <b>Generate</b>.</div>`;
      }
    }
    refreshComposeRow();
    setLoading(false);

    // Async restore from server — non-blocking. If a saved state for this
    // title exists, apply it on top of the freshly-rendered picker. The
    // user briefly sees the picker, then sees their prior WIP appear
    // (selected card, composed prompt, last result).
    //
    // EXCEPTION: if this mount came with a refined_prompt, the user is
    // explicitly starting a new generation — don't auto-restore a stale
    // image into the preview pane. The new prompt is the "current state",
    // not the previous result.
    const skipResultRestore = !!payload.refined_prompt;
    (async () => {
      const saved = await loadStateForTitleAsync(titleEl?.value);
      if (!saved) return;
      if (saved.prompt && promptEl && !promptEl.value) {
        promptEl.value = saved.prompt;
        promptIsComposed = !!saved.promptIsComposed;
      }
      if (saved.selectedOutlier?.thumbnail_url) {
        selectedOutlier = saved.selectedOutlier;
        setSingleRefInUrls(saved.selectedOutlier.thumbnail_url);
        outliersGrid.querySelectorAll(".outlier-card").forEach((c) => {
          const img = c.querySelector("img");
          if (img && img.src === saved.selectedOutlier.thumbnail_url) {
            c.classList.add("selected");
          }
        });
      }
      if (saved.stylePreset && stylePresetEl) stylePresetEl.value = saved.stylePreset;
      if (saved.aspectRatio && aspectEl) aspectEl.value = saved.aspectRatio;
      if (saved.resolution && resolutionEl) resolutionEl.value = saved.resolution;
      if (saved.priorImageForReference) priorImageForReference = saved.priorImageForReference;
      refreshComposeRow();
      if (skipResultRestore) return;
      // If they had a successful or failed generation last time, re-render
      // it instead of the "click a reference" hint. Skip pending state —
      // the task_id is likely stale.
      if (saved.lastResultPayload && saved.lastResultPayload.state !== "pending") {
        render(saved.lastResultPayload, app, { skipSave: true });
      }
    })();
    return;
  }
  // Restore the prompt the user submitted so subsequent edits start from it.
  if (payload.prompt && !promptEl.value) promptEl.value = payload.prompt;
  if (payload.aspect_ratio) aspectEl.value = payload.aspect_ratio;
  if (payload.resolution) resolutionEl.value = payload.resolution;
  if (payload.style_preset && stylePresetEl) stylePresetEl.value = payload.style_preset;

  // Outliers can ride along with ANY payload (pending / success / fail) when
  // generate_thumbnail was called with find_outliers_first=true. Render them
  // alongside the preview / result so the user keeps the picker in the same
  // widget instance and can swap references without re-prompting.
  if (Array.isArray(payload.outliers) && payload.outliers.length) {
    renderOutliers({
      topic: payload.outlier_topic || payload.prompt,
      outliers: payload.outliers,
      content_type: payload.content_type,
      error: payload.outlier_error,
    });
  } else if (payload.outlier_error) {
    renderOutliers({
      topic: payload.outlier_topic || payload.prompt,
      outliers: [],
      error: payload.outlier_error,
    });
  }

  // If the server told us about references it resolved, mirror them into
  // the textarea + thumbnails so the user sees what's being passed to Kie
  // (covers the case where the host pipes a tool result in via ontoolresult
  // from a Claude-initiated call, not the widget's own Generate click).
  if (Array.isArray(payload.reference_urls) && payload.reference_urls.length && refUrlsEl && !refUrlsEl.value) {
    refUrlsEl.value = payload.reference_urls.join("\n");
    if (refBox) {
      refBox.style.display = "flex";
      if (refToggle) refToggle.textContent = "– Hide reference images";
    }
    renderRefThumbs();
  }

  // Generation in flight — show spinner and start (or keep) polling.
  if (payload.state === "pending" && payload.task_id) {
    preview.innerHTML = '<div class="spinner"></div>';
    meta.style.display = "none";
    setLoading(true);
    if (activePollTaskId !== payload.task_id) {
      stopPolling();
      startPolling(payload.task_id, app, {
        prompt: payload.prompt,
        aspect_ratio: payload.aspect_ratio,
        resolution: payload.resolution,
        reference_urls: payload.reference_urls,
        style_preset: payload.style_preset,
        outliers: payload.outliers,
        outlier_topic: payload.outlier_topic,
      });
    }
    return;
  }

  // Terminal states — stop any poller and render result/error.
  stopPolling();

  if (payload.state === "fail" || payload.error) {
    preview.innerHTML = `<div class="err">${escape(payload.error || "Generation failed")}</div>`;
    meta.style.display = "none";
    setLoading(false);
    // Persist the failure too so reopening the chat doesn't silently drop
    // the user back at the picker as if nothing happened.
    if (!opts.skipSave) {
      lastResultPayload = payload;
      saveState();
    }
    return;
  }
  const images = Array.isArray(payload.images) ? payload.images : [];
  if (images.length === 0) {
    preview.innerHTML = `<div class="empty">Generation returned no image.</div>`;
    meta.style.display = "none";
    setLoading(false);
    return;
  }
  const url = images[0];
  preview.innerHTML = `<img src="${escape(url)}" referrerpolicy="no-referrer" alt="generated thumbnail">`;
  preview.querySelector("img").addEventListener("click", () => {
    app.openLink({ url }).catch(() => {});
  });

  const bits = [];
  if (payload.aspect_ratio) bits.push(payload.aspect_ratio);
  if (payload.resolution) bits.push(payload.resolution);
  if (payload.cost_time_s != null) bits.push(`${Number(payload.cost_time_s).toFixed(1)}s`);
  bits.push(`<a href="${escape(url)}" data-open>Open full size</a>`);
  meta.innerHTML = bits.join(" · ");
  meta.style.display = "flex";
  meta.querySelectorAll("a[data-open]").forEach((a) => {
    a.addEventListener("click", (e) => {
      e.preventDefault();
      app.openLink({ url: a.getAttribute("href") }).catch(() => {});
    });
  });
  setLoading(false);
  // Persist successful generation so chat close/reopen restores the image
  // instead of dropping the user back at the picker.
  if (!opts.skipSave) {
    lastResultPayload = payload;
    saveState();
  }
}

function applyHostContext(ctx) {
  document.documentElement.classList.toggle("dark", ctx?.theme === "dark");
  if (ctx?.styles?.variables && typeof applyHostStyleVariables === "function") {
    applyHostStyleVariables(ctx.styles.variables);
  }
}

(async () => {
  const app = new App({ name: "ThumbnailStudio", version: "1.0.0" }, {}, { autoResize: true });
  _appRef = app;  // make available to save/load helpers

  app.ontoolresult = ({ content }) => {
    try {
      const text = content?.[0]?.text ?? "";
      const data = text ? JSON.parse(text) : null;
      render(data, app);
    } catch (err) {
      preview.innerHTML = `<div class="err">Bad payload: ${escape(err.message)}</div>`;
    }
  };
  app.onhostcontextchanged = applyHostContext;

  // Reference URL section — toggle + live thumbnail previews.
  if (refToggle && refBox) {
    refToggle.addEventListener("click", () => {
      const open = refBox.style.display !== "none";
      refBox.style.display = open ? "none" : "flex";
      refToggle.textContent = open
        ? "+ Add reference images (URLs)"
        : "– Hide reference URLs";
      if (!open) refUrlsEl?.focus();
    });
  }
  if (refUrlsEl) {
    refUrlsEl.addEventListener("input", renderRefThumbs);
    refUrlsEl.addEventListener("paste", () => setTimeout(renderRefThumbs, 0));
  }

  // Outliers: pull from algrow via the server tool, render as a clickable grid.
  if (outliersBtn) {
    outliersBtn.addEventListener("click", async () => {
      const topic = promptEl.value.trim();
      if (!topic) {
        promptEl.focus();
        return;
      }
      outliersSection.style.display = "flex";
      outliersMeta.textContent = "searching algrow…";
      // Algrow's semantic outlier search can take 30–60s, occasionally
      // longer. Show the spinner + a "this takes a while" hint so the
      // user doesn't think the widget hung.
      outliersGrid.innerHTML = (
        '<div style="display:flex;flex-direction:column;align-items:center;gap:8px;padding:16px;">' +
        '<div class="spinner"></div>' +
        '<div class="hint">Searching algrow… 30–60s on cold queries.</div>' +
        '</div>'
      );
      try {
        const res = await app.callServerTool({
          name: "find_outlier_references",
          arguments: { topic, content_type: "longform", limit: 12 },
        });
        const text = res?.content?.[0]?.text ?? "";
        const data = text ? JSON.parse(text) : null;
        if (!data) {
          outliersGrid.innerHTML = `<div class="err" style="padding:6px;">No response from server.</div>`;
          return;
        }
        renderOutliers(data);
      } catch (err) {
        outliersGrid.innerHTML = `<div class="err" style="padding:6px;">${escape(err?.message || "Failed to fetch outliers")}</div>`;
      }
    });
  }
  if (outliersCloseBtn) {
    outliersCloseBtn.addEventListener("click", () => {
      outliersSection.style.display = "none";
      outliersGrid.innerHTML = "";
    });
  }

  // Title and prompt edits both invalidate state downstream. Title changes
  // mean the engineered prompt (if any) is stale; prompt edits mean the
  // user has rewritten the prompt themselves so we shouldn't treat it as
  // a server-composed prompt anymore.
  titleEl?.addEventListener("input", () => {
    promptIsComposed = false;
    refreshComposeRow();
    saveState();
  });
  promptEl?.addEventListener("input", () => {
    promptIsComposed = false;
    saveState();
  });
  stylePresetEl?.addEventListener("change", saveState);
  aspectEl?.addEventListener("change", saveState);
  resolutionEl?.addEventListener("change", saveState);

  composeBtn?.addEventListener("click", async () => {
    const title = (titleEl?.value || "").trim();
    const refs = parseRefUrls();
    if (!title || !refs.length) {
      refreshComposeRow();
      return;
    }
    const originalLabel = composeBtn.textContent;
    composeBtn.disabled = true;
    composeBtn.textContent = "Composing…";
    if (composeHint) composeHint.textContent = "Analyzing reference and engineering the prompt…";
    try {
      const composeArgs = {
        title,
        reference_url: refs[0],
        style_preset: stylePresetEl?.value || "person_focal",
      };
      // Pass the reference's original title when we have it — gives the
      // server-side mapping step a semantic anchor (why did THIS thumbnail
      // work for THAT title?) before mapping to the user's NEW title.
      if (selectedOutlier?.thumbnail_url === refs[0] && selectedOutlier?.title) {
        composeArgs.reference_title = selectedOutlier.title;
      }
      const res = await app.callServerTool({
        name: "compose_thumbnail_prompt",
        arguments: composeArgs,
      });
      const text = res?.content?.[0]?.text ?? "";
      const data = text ? JSON.parse(text) : null;
      if (!data?.success || !data?.prompt) {
        if (composeHint) composeHint.textContent = `Couldn't compose prompt: ${data?.error || data?.analysis_warning || "unknown error"}`;
        composeBtn.disabled = false;
        composeBtn.textContent = originalLabel;
        return;
      }
      promptEl.value = data.prompt;
      promptIsComposed = true;
      if (composeHint) composeHint.textContent = "Prompt ready below. Review/edit if you want, then click Generate.";
      composeBtn.textContent = "Recompose";
      composeBtn.disabled = false;
      // Pull the prompt textarea into view so it's obvious it got filled.
      promptEl.scrollIntoView({ behavior: "smooth", block: "nearest" });
    } catch (err) {
      if (composeHint) composeHint.textContent = `Compose failed: ${escape(err.message || String(err))}`;
      composeBtn.disabled = false;
      composeBtn.textContent = originalLabel;
    }
  });

  generateBtn.addEventListener("click", async () => {
    const prompt = promptEl.value.trim();
    if (!prompt) {
      promptEl.focus();
      return;
    }
    setLoading(true);
    try {
      const args = {
        prompt,
        aspect_ratio: aspectEl.value,
        resolution: resolutionEl.value,
        style_preset: stylePresetEl?.value || "person_focal",
      };
      const refs = parseRefUrls();
      // Multi-turn editing: if there's a previously-generated image, use
      // THAT as the reference — the user is iterating on the output, so
      // Gemini should edit the prior image rather than re-imagine from
      // the original source-video thumbnail. Falls back to the picked
      // reference for the first generation (no prior result yet).
      // Check both: lastResultPayload (current in-memory result, before a
      // refinement clears it) and priorImageForReference (stashed when
      // a refinement clears the payload but the URL still matters).
      const priorImage = lastResultPayload?.images?.[0] || priorImageForReference;
      if (priorImage) {
        args.reference_urls = [priorImage];
      } else if (refs.length) {
        args.reference_urls = refs;
      }
      // If the prompt was engineered server-side via compose_thumbnail_prompt,
      // it already contains the preset rules + reference directives — send
      // it verbatim so the server doesn't double-prepend.
      if (promptIsComposed) {
        args.style_preset = "none";
        args.analyze_references = false;
      }

      const res = await app.callServerTool({
        name: "generate_thumbnail",
        arguments: args,
      });
      // callServerTool returns the tool's content; route it through the
      // same renderer so the result/error path is identical to ontoolresult.
      // render() decides whether to keep the button disabled (pending →
      // polling) or re-enable it (success/fail/no-image). DO NOT
      // setLoading(false) here in a finally — that would re-enable the
      // button while a poll is still in flight, letting a spam-clicker
      // submit a new Kie task (3 credits each) on every click.
      const text = res?.content?.[0]?.text ?? "";
      const data = text ? JSON.parse(text) : null;
      render(data, app);
    } catch (err) {
      preview.innerHTML = `<div class="err">Request failed: ${escape(err.message)}</div>`;
      setLoading(false);
    }
  });

  await app.connect();
  applyHostContext(app.getHostContext());
})();
</script>
</body>
</html>
